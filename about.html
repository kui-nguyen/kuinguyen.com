        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        #header {
            transition: top 0.3s ease-in-out;
        }

        #header-logo {
            filter: invert(1) brightness(1.5);
        }
        
        .role-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
            margin: 2rem auto 0;
        }

        .orbit {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            animation: spin-clockwise 40s linear infinite;
        }

        .center-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32%;
            height: 32%;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .role-circle {
            position: absolute;
            width: 22%;
            height: 22%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 8px;
            border: 3px solid transparent;
            opacity: 0;
            transform: scale(0.5);
            animation: fadeInScale 0.5s forwards, spin-counter-clockwise 40s linear infinite;
        }
        
        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes spin-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-counter-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }
        
        .role-circle:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            font-weight: 800;
        }
        
        .role-circle.active {
            border-color: #818cf8;
            box-shadow: 0 8px 30px rgba(129, 140, 248, 0.2);
        }

        .centered-role {
            width: 40% !important;
            height: 40% !important;
            left: 50% !important;
            top: 50% !important;
            margin-left: -20% !important;
            margin-top: -20% !important;
            font-size: 1.15rem !important;
            z-index: 30 !important;
            opacity: 1 !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5) !important;
            font-weight: 800 !important;
        }

        .gathered-role {
            left: 50% !important;
            top: 50% !important;
            margin-left: -11% !important;
            margin-top: -11% !important;
            transform: rotate(360deg) scale(0) !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        #curved-name-container {
            margin-top: -1rem; 
            transition: opacity 0.5s ease;
        }
        
        #curved-name textPath {
            font-family: 'Pacifico', cursive;
            fill: #e2e8f0;
            font-size: 2.2rem;
            text-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }
        
        #role-details-container {
            min-height: 250px;
            transition: all 0.5s ease-in-out;
        }
        
        .gallery-image {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gallery-image:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .digital-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(203, 157, 94, 0.3);
            box-shadow: 0 0 40px rgba(203, 157, 94, 0.1);
        }
        
        .digital-card .brand-gold-text {
            color: #cb9d5e;
            filter: drop-shadow(0 0 5px rgba(203, 157, 94, 0.5));
        }
        
        .social-icon-link {
            transition: transform 0.2s ease-in-out, color 0.2s ease-in-out;
        }
        .social-icon-link:hover {
            transform: scale(1.1);
            color: #fff;
        }

        @media (max-width: 767px) {
            .role-circle {
                font-size: 0.65rem;
            }
            .centered-role {
                font-size: 1rem !important;
            }
            #curved-name textPath {
                font-size: 1.8rem;
            }
            #curved-name-container {
                 margin-top: -1.5rem;
            }
            .digital-card {

            }

                border-right: 0 !important;
                border-bottom: 1px solid rgba(203, 157, 94, 0.3);
                padding-bottom: 1.5rem !important;
                margin-bottom: 1.5rem !important;
            }
        }
    </style>

            function positionCircles() {
                const radius = container.offsetWidth * 0.42; 
                const angleStep = (2 * Math.PI) / circles.length;
                circles.forEach((circle, index) => {
                    const angle = index * angleStep - (Math.PI / 2);
                    const x = radius * Math.cos(angle) + container.offsetWidth / 2;
                    const y = radius * Math.sin(angle) + container.offsetHeight / 2;
                    circle.style.left = `${x - circle.offsetWidth / 2}px`;
                    circle.style.top = `${y - circle.offsetHeight / 2}px`;
                });
            }
            
            function applyTheme(theme) {
                roleDetailsCard.classList.remove(...allThemeClasses);
                backToTopBtn.classList.remove(...allThemeClasses);
                roleDetailsCard.classList.add(theme.cardBg, theme.borderColor, 'border');
                backToTopBtn.classList.add(theme.buttonBg, theme.buttonHover);
            }
            
            function renderContent(data, theme) {
                detailsContentContainer.innerHTML = '';
                galleryWrapper.innerHTML = '';
                
                let contentHtml = `<div class="hidden md:grid grid-cols-2 gap-x-8">
                                    <h4 class="${theme.titleColor} text-center text-xl font-bold">Tiếng Việt</h4>
                                    <h4 class="${theme.titleColor} text-center text-xl font-bold">English</h4>
                                </div>
                                <hr class="hidden md:block ${theme.borderColor} my-4">
                                <h4 class="text-center text-xl font-bold mb-4 md:hidden ${theme.titleColor}">Tiếng Việt</h4>`;

                let rowsHtml = '';
                let mobileEnHtml = '';
                
                if (data.content) {
                    data.content.forEach(item => {
                        if (item.type === 'heading') {
                            const viPart = `<h5 class="font-bold ${theme.headingColor} mb-2 mt-6">${item.vi}</h5>`;
                            const enPart = `<h5 class="font-bold ${theme.headingColor} mb-2 mt-6">${item.en}</h5>`;
                            rowsHtml += `<div class="grid grid-cols-1 md:grid-cols-2 md:gap-x-8 w-full"><div>${viPart}</div><div class="hidden md:block">${enPart}</div></div>`;
                            mobileEnHtml += enPart;
                        } else if (item.type === 'center-heading') {
                            const centerPart = `<h5 class="font-bold ${theme.headingColor} mb-2 mt-6 w-full text-center">${item.text}</h5>`;
                            rowsHtml += `<div class="grid grid-cols-1 md:grid-cols-2 md:gap-x-8 w-full"><div class="col-span-1 md:col-span-2 flex justify-center">${centerPart}</div></div>`;
                            mobileEnHtml += `<div class="flex justify-center">${centerPart}</div>`;
                        } else if (item.type === 'project-list') {
                            let gridItems = '';
                            item.items.forEach(proj => {
                                gridItems += `<div class="flex text-gray-400 mb-3"><span class="${theme.bulletColor} mr-3 mt-1">&#8226;</span><div class="!m-0">${proj}</div></div>`;
                            });
                            const fullGrid = `<div class="grid grid-cols-1 md:grid-cols-2 md:gap-x-8 w-full">${gridItems}</div>`;
                            rowsHtml += fullGrid;
                            mobileEnHtml += fullGrid;
                        } else if (item.type === 'item') {
                            const viPart = `<div class="flex text-gray-400 mb-3"><span class="${theme.bulletColor} mr-3 mt-1">&#8226;</span><div class="!m-0">${item.vi}</div></div>`;
                            const enPart = `<div class="flex text-gray-400 mb-3"><span class="${theme.bulletColor} mr-3 mt-1">&#8226;</span><div class="!m-0">${item.en}</div></div>`;
                            rowsHtml += `<div class="grid grid-cols-1 md:grid-cols-2 md:gap-x-8 w-full"><div>${viPart}</div><div class="hidden md:block">${enPart}</div></div>`;
                            mobileEnHtml += enPart;
                        }
                    });
                }
                
                contentHtml += `<div class="relative pb-4">
                                    <div class="hidden md:block absolute top-0 bottom-0 left-1/2 w-px ${theme.borderColor} transform -translate-x-1/2"></div>
                                    <div>${rowsHtml}</div>
                               </div>
                               <div class="md:hidden">
                                    <h4 class="text-center text-xl font-bold mb-4 mt-8 ${theme.titleColor}">English</h4>
                                    <div>${mobileEnHtml}</div>
                                </div>`;

                detailsContentContainer.innerHTML = contentHtml;

                if (data.gallery) {
                    const galleryContainer = document.createElement('div');
                    galleryContainer.className = 'mt-4';
                    
                    if (data.galleryTitle) {
                        galleryContainer.innerHTML = `<div class="w-full flex justify-center"><h5 class="font-bold ${theme.headingColor} mb-4 mt-6">${data.galleryTitle}</h5></div>`;
                    }
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-2 md:grid-cols-4 gap-4';
                    data.gallery.forEach(imgData => {
                        const img = document.createElement('img');
                        img.src = imgData.src; img.alt = imgData.alt;
                        img.className = 'rounded-lg cursor-pointer gallery-image w-full h-auto object-cover aspect-video';
                        img.addEventListener('click', () => { openModal(imageModal, () => { modalImage.src = img.src; }); });
                        grid.appendChild(img);
                    });
                    galleryContainer.appendChild(grid);
                    galleryWrapper.appendChild(galleryContainer);
                }
            }

            circles.forEach(circle => {
                circle.addEventListener('click', () => {
                    roleDetailsCard.style.opacity = 1;
                    roleDetailsCard.style.pointerEvents = 'auto';
                    circles.forEach(c => {
                        c.classList.remove('active', 'centered-role', 'gathered-role', 'fade-out');
                        if (c !== circle) c.classList.add('gathered-role');
                    });
                    circle.classList.add('active', 'centered-role');
                    centerImage.classList.add('fade-out');
                    curvedNameContainer.classList.add('fade-out');
                    orbit.style.animationPlayState = 'paused';
                    circles.forEach(c => c.style.animationPlayState = 'paused');

                    const theme = roleThemes[circle.id] || roleThemes['role-engineer'];
                    applyTheme(theme);
                    renderContent(roleData[circle.id], theme);
                    const headerOffset = header.offsetHeight + 20;
                    window.scrollTo({ top: roleDetailsCard.getBoundingClientRect().top + window.pageYOffset - headerOffset, behavior: 'smooth' });
                });
            });

            backToTopBtn.addEventListener('click', () => {
                 window.scrollTo({ top: 0, behavior: 'smooth' });
                 circles.forEach(c => c.classList.remove('active', 'centered-role', 'gathered-role', 'fade-out'));
                 centerImage.classList.remove('fade-out');
                 curvedNameContainer.classList.remove('fade-out');
                 orbit.style.animationPlayState = 'running';
                 circles.forEach(c => c.style.animationPlayState = 'running');
                 roleDetailsCard.style.opacity = 0;
                 roleDetailsCard.style.pointerEvents = 'none';
            });

            function openModal(modal, callback) {
                modal.classList.remove('hidden'); modal.classList.add('flex');
                if (callback) callback();
                setTimeout(() => { const card = modal.querySelector('.transform'); if(card) card.classList.remove('scale-95', 'opacity-0'); }, 10);
            }

            function closeModal(modal) {
                 const card = modal.querySelector('.transform');
                 if(card) {
                    card.classList.add('scale-95', 'opacity-0');
                 }
                setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
            }

            imageModalClose.onclick = () => closeModal(imageModal);
            imageModal.onclick = (e) => { if (e.target === imageModal) closeModal(imageModal); }
            centerImage.addEventListener('click', () => openModal(infoModal));
            infoModalClose.onclick = () => closeModal(infoModal);
            infoModal.onclick = (e) => { if (e.target === infoModal) closeModal(infoModal); }

            positionCircles();
            window.addEventListener('resize', positionCircles);
        });
    </script>
